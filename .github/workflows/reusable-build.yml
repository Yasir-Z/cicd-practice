name: reuseable-workflow

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true

      environment:
        type: string
        required: true
        default: staging

    secrets:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  reuse-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code 
        uses: actions/checkout@v4

      - name: Prints Building <app_name> for <environment>
        run: echo "Building ${{ input.app-name }} for ${{ input.environment }}."

      - name: Prints Docker token
        run: echo "Docker token is set true"





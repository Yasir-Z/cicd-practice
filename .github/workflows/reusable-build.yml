name: reuseable-workflow

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      environment:
        type: string
        required: true
        default: staging
    secrets:
      DOCKERHUB_TOKEN:
        required: true
    outputs:
      result:
        description: "The build version"
        value: ${{ jobs.build.outputs.final-result }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      final-result: ${{ steps.step1.outputs.test }}
    steps:
      - name: checkout the code 
        uses: actions/checkout@v4

      - name: Prints Building info
        run: echo "Building ${{ inputs.app-name }} for ${{ inputs.environment }}."

      - name: print version of build
        id: step1
        run: echo "test=v1.0-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

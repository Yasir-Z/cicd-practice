name: set-trigger

on:
  workflow_call:
    inputs:
      app_name: 
        - web-app
      environment:
        - stagging   
      secrets:
        DOCKERHUB_USER: 
          required: true
        DOCKERHUB_TOKEN:
          required: true 

jobs:
  set-workflow-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo for latest code 
        uses: actions/checkout@v4
      - name: Print app name and environment
        run: echo "Building ${{ inputs.app_name }} for ${{ inputs.environmet }}."   
      - name: "Prints Docker token is set: true"
        run: echo "Docker token is set: true"


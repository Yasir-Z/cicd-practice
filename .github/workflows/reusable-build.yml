# Start workflow 
name: set-trigger

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        default: web-app
      environment:
        type: string
        default: staging
    outputs:
      build_version:
      description: "The generated build version"
      value: ${{ jobs.build.outputs.build_version }}

    secrets:
      DOCKERHUB_USER:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  set-workflow-trigger:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_tag.outputs.TAG }}
    steps:
      - name: Checkout repo for latest code
        uses: actions/checkout@v4

      - name: Print app name and environment
        run: echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}."

      - name: "Prints Docker token is set: true"
        run: echo "Docker token is set true"
      - name: Generate version
        id: get_tag
        run: echo "sha_short=v1.0-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT"

  

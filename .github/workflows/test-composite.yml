name: Test Composite Action

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Greeting Action
        id: greet_step
        uses: ./.github/actions/setup-and-greet
        with:
          name: "Gemini"
          language: "en"

      - name: Verify Output
        run: echo "Action finished successfully? ${{ steps.greet_step.outputs.greeted }}"

name: call-build

on:
  push:
    branches: [main]

jobs:
  call-reusable:
    uses: ./.github/workflows/reusable-build.yml
    with:
      app-name: "my-web-app"
      environment: "production"
    # FIXED: Secrets must be indented at the same level as 'with'
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  use-result:
    needs: call-reusable
    runs-on: ubuntu-latest
    steps:
      - name: Get from reusable job
        # FIXED: Now correctly references 'result' from the reusable workflow
        run: echo "final version is ${{ needs.call-reusable.outputs.result }}"

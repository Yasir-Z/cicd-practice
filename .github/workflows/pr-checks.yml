name: filesize-cicd

on:
  pull_request:
    branches:
      - main

jobs:
  file-size-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if file >1MB
        run: |
          for f in $(git diff --name-only origin/main...HEAD); do
            if [ -f "$f" ] && [ $(stat -c%s "$f") -gt 1048576 ]; then
              echo "$f exceeds 1MB"
              exit 1
            fi
          done

#Starts here
name: file-size-cicd

on:
  pull_request:
    branches:
      - main

jobs:
  file-size-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check file sizes in PR
        run: |
          for f in $(git diff --name-only origin/main...HEAD); do
            if [ -f "$f" ] && [ $(stat -c%s "$f") -gt 1048576 ]; then
              echo "$f exceeds 1MB"
              exit 1
            fi
          done
        continue-on-error: true

  branch-name-check:
    runs-on: ubuntu-latest
    steps:
      - name: Reads the branch name from
        run: echo "branch is ${{ github.head_ref }}"
      - name: Fail if not follow pattern
        run: |
          if [[ ! "${{ github.head_ref }}" =~ ^(feature|fix|docs)/ ]]; then
            echo "Branch must start with feature/, fix/, or docs/"
            exit 1
          fi      
  
  pr-body-check:
    runs-on: ubuntu-latest
    steps:
      - name: Read PR body
        run: echo "PR body is ${{ github.event.pull_request.body }}"

      - name: Warns (but doesn't fail) if the PR description is empty
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          if [[ -z "$PR_BODY" ]]; then
            echo "⚠️ Warning: PR description is empty."
          else
            echo "✅ PR description is present."
          fi


      

